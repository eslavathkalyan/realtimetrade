services:
  mysql:
    image: mysql:8.0
    container_name: crypto_db
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: TradingAppDB
      MYSQL_USER: tradinguser
      MYSQL_PASSWORD: tradingpass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tradinguser", "-ptradingpass"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - trading-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: crypto_zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - trading-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: crypto_kafka
    restart: always
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - trading-network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: crypto_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic trade-events
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic price-updates
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic notification-events
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic transaction-events
      echo 'Topics created successfully.'
      kafka-topics --list --bootstrap-server kafka:9092
      "
    networks:
      - trading-network


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cryptoapp-backend:v1
    container_name: CryptoApp-backend
    restart: always
    ports:
      - "8081:8081"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/credentials/tradingchatbot-service-account.json:/app/credentials/gcp.json
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/gcp.json
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=mysql
      - DB_PORT=3306
    depends_on:
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - trading-network

  redis:
    image: redis:7-alpine    
    container_name: crypto_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - trading-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: cryptoapp-frontend:v1  
    container_name: CryptoApp-frontend
    restart: always
    ports:
      - "3001:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge

volumes:
  mysql_data:
